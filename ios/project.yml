# XcodeGen spec — regenerate the project with `xcodegen` (declarative, so the .xcodeproj need not
# be hand-maintained). Team 8GHXL328AR, bundle io.river.familiar.ios.
name: FamiliarAgent
options:
  bundleIdPrefix: io.river.familiar
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
    macOS: "14.0"
settings:
  base:
    DEVELOPMENT_TEAM: 8GHXL328AR
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "17"
packages:
  FamiliarMesh:
    path: FamiliarMesh
targets:
  FamiliarAgent:
    type: application
    platform: iOS
    sources:
      - App/Sources
      - App/Assets.xcassets
      # The Metal Sphere console — the same web bundle the Mac console renders, kept as a
      # folder reference so the page loads from "sphere/" at runtime on every platform.
      - path: MacApp/Resources/sphere
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.river.familiar.ios
        INFOPLIST_FILE: App/Support/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: FamiliarMesh
        product: FamiliarMesh
      # Embed the watch app inside the iPhone app so iOS registers it as the companion:
      # WCSession.isWatchAppInstalled turns true, the address hand-off flows, and the watch
      # rides along through TestFlight. (Standalone-installed watch apps never link.)
      - target: FamiliarWatch
        embed: true
  # The macOS peer's console — a SwiftUI app (the standard dark design) that reads the node running
  # on the same machine over the loopback-only GET /local/worldview. A peer among equals, no "host".
  FamiliarMac:
    type: application
    platform: macOS
    sources:
      - MacApp/Sources
      # The Metal Sphere web console — kept as a folder reference so the page loads from
      # the "sphere/" subdirectory at runtime (Bundle …/Resources/sphere/index.html).
      - path: MacApp/Resources/sphere
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.river.familiar.mac
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "0.1.0"
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_KEY_NSAppTransportSecurity_NSAllowsLocalNetworking: YES
        # Covenant baseline: the node reports its position; macOS uses wifi positioning.
        INFOPLIST_KEY_NSLocationUsageDescription: The familiar reports this node's position to your mesh — location is part of the covenant.
    dependencies:
      - package: FamiliarMesh
        product: FamiliarMesh
  # A watchOS companion — its own covenant node (heart rate + motion → derived observations).
  # Receives the familiar's address from the paired iPhone via WatchConnectivity, but runs
  # independently. Bundle id MUST be prefixed by the companion's (io.river.familiar.ios.*).
  FamiliarWatch:
    type: application
    platform: watchOS
    deploymentTarget: "9.0"
    sources:
      - Watch/Sources
      - Watch/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.river.familiar.ios.watch
        INFOPLIST_FILE: Watch/Support/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: Watch/Support/Familiar.entitlements
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: FamiliarMesh
        product: FamiliarMesh
