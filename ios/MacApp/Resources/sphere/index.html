<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!--
  The Familiar — Metal Sphere console (from Claude Design "Familiar Metal Sphere.dc.html").
  A satellite globe with the mesh's nodes pinned aboard, orbiting glyph screens, and a
  borderless hologram panel. All content is REAL: the hosting Swift app polls the daemon's
  loopback /local/worldview and calls window.sphereUpdate(view); human acts (answers, gate
  flips) go back through webkit.messageHandlers → POST /local/answer | /local/gate.
  Three.js + Blue Marble textures load from unpkg (needs internet once; cached after).
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:#03050a;overflow:hidden;}
  a{color:#7aa2ff;text-decoration:none;}
  button{font-family:inherit;}
  ::-webkit-scrollbar{width:0;height:0;display:none;}
  .hos{scrollbar-width:none;-ms-overflow-style:none;}
  .hos::-webkit-scrollbar{width:0;height:0;display:none;}
  @keyframes glowpulse{0%,100%{opacity:0.4;transform:scale(0.94);}50%{opacity:0.82;transform:scale(1.12);}}
  @keyframes aurora{0%{transform:translate(0,0) scale(1);}50%{transform:translate(3%,-2.5%) scale(1.06);}100%{transform:translate(0,0) scale(1);}}
  @keyframes ping{0%{opacity:0.8;transform:scale(0.5);}70%,100%{opacity:0;transform:scale(2.8);}}
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes floaty{0%,100%{transform:translate(-50%,-50%) translateY(0);}50%{transform:translate(-50%,-50%) translateY(-5px);}}
  @keyframes holoflicker{0%,100%{opacity:1;}45%{opacity:0.98;}47%{opacity:0.93;}49%{opacity:0.99;}72%{opacity:0.96;}74%{opacity:1;}}
  @keyframes holoscan{0%{background-position:0 0;}100%{background-position:0 -220px;}}
  @keyframes holobase{0%,100%{opacity:0.7;transform:translateX(-50%) scaleX(0.94);}50%{opacity:1;transform:translateX(-50%) scaleX(1.04);}}
  @keyframes eqb{0%,100%{transform:scaleY(0.45);}50%{transform:scaleY(1);}}
  @keyframes iconpulse{0%,100%{transform:scale(0.85);opacity:0.7;}50%{transform:scale(1.1);opacity:1;}}
  @keyframes dashmove{to{stroke-dashoffset:-144;}}
  @keyframes mer{0%,100%{transform:scaleX(0.2);}50%{transform:scaleX(1);}}
  @keyframes orbitspin{to{transform:rotate(360deg);}}
  @keyframes blink{0%,90%,100%{transform:scaleY(1);}94%{transform:scaleY(0.08);}}
  @keyframes knob{0%,100%{transform:translateX(-7px);}50%{transform:translateX(7px);}}
  .scrbtn{position:absolute;transform:translate(-50%,-50%);z-index:8;display:flex;align-items:center;justify-content:center;width:clamp(58px,7.6vmin,94px);height:clamp(58px,7.6vmin,94px);border:none;border-radius:50%;cursor:pointer;transition:background 0.3s,transform 0.2s;}
  .scrbtn span.ic{position:relative;display:block;width:clamp(30px,4.4vmin,54px);height:clamp(30px,4.4vmin,54px);filter:drop-shadow(0 0 7px rgba(120,200,255,0.6));}
  .card{padding:16px 17px;border-radius:16px;}
  .m{font-family:'IBM Plex Mono',monospace;}
</style>
</head>
<body>
<div id="root" style="position:relative;width:100vw;height:100vh;overflow:hidden;background:radial-gradient(130% 100% at 50% 0%, #0a1024 0%, #05070f 46%, #03050a 100%);color:#eef2fb;font-family:'Space Grotesk',-apple-system,sans-serif;">

  <canvas id="globe" style="position:absolute;inset:0;width:100%;height:100%;display:block;z-index:1;"></canvas>
  <canvas id="street" style="position:absolute;inset:0;width:100%;height:100%;display:block;z-index:1;opacity:0;pointer-events:none;"></canvas>

  <div style="position:absolute;top:-16vh;left:-12vw;width:52vw;height:52vw;border-radius:50%;background:radial-gradient(circle,rgba(47,107,255,0.13),rgba(47,107,255,0) 68%);filter:blur(24px);pointer-events:none;z-index:0;animation:aurora 24s ease-in-out infinite;"></div>
  <div style="position:absolute;bottom:-20vh;right:-14vw;width:58vw;height:58vw;border-radius:50%;background:radial-gradient(circle,rgba(30,60,170,0.15),rgba(30,60,170,0) 66%);filter:blur(26px);pointer-events:none;z-index:0;animation:aurora 28s ease-in-out infinite reverse;"></div>
  <div style="position:absolute;inset:0;pointer-events:none;z-index:2;background:radial-gradient(120% 90% at 50% 45%, transparent 52%, rgba(3,5,10,0.62) 100%);"></div>
  <div style="position:absolute;inset:0;z-index:2;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(150,215,255,0.026) 0px,rgba(150,215,255,0.026) 1px,transparent 1px,transparent 3px);mix-blend-mode:screen;animation:holoscan 11s linear infinite;"></div>

  <div id="callouts" style="position:absolute;inset:0;z-index:4;pointer-events:none;opacity:0;transition:opacity 0.5s;"></div>

  <div style="position:absolute;top:14px;left:50%;transform:translateX(-50%);z-index:7;display:flex;align-items:center;gap:11px;padding:6px 14px;border-radius:11px;background:rgba(9,15,32,0.4);border:1px solid rgba(132,206,255,0.16);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);font-family:'IBM Plex Mono',monospace;font-size:clamp(8.5px,1vw,10px);letter-spacing:0.06em;color:rgba(200,224,255,0.68);pointer-events:none;">
    <span style="display:flex;align-items:center;gap:6px;"><span style="width:14px;height:14px;border-radius:4px;background:linear-gradient(135deg,#8fb4ff,#2f63e6);display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:600;color:#0a1330;">M</span>Metal · macOS</span>
    <span style="opacity:0.4;">·</span><span><span id="fps">60</span> fps</span>
    <span style="opacity:0.4;">·</span><span>MERIDIAN <span id="lon" style="color:#aee7ff;">+0°</span></span>
    <span style="opacity:0.4;">·</span><span id="linkstat" style="color:#8ef0c6;">LINKED</span>
  </div>

  <div id="screenbtns"></div>

  <div id="holo" style="position:absolute;top:50%;left:50%;width:min(1040px,80vw);height:min(85vh,940px);z-index:6;display:flex;flex-direction:column;border-radius:60px;overflow:hidden;background:linear-gradient(158deg,rgba(20,44,80,0.128),rgba(8,20,40,0.056));backdrop-filter:blur(15px) saturate(1.35);-webkit-backdrop-filter:blur(15px) saturate(1.35);box-shadow:0 0 90px rgba(60,150,255,0.13);-webkit-mask-image:linear-gradient(180deg,transparent 0%,#000 11%,#000 89%,transparent 100%),linear-gradient(90deg,transparent 0%,#000 6%,#000 94%,transparent 100%);-webkit-mask-composite:source-in;-webkit-mask-repeat:no-repeat;animation:floaty 11s ease-in-out infinite,holoflicker 8s ease-in-out infinite;">
    <div style="position:absolute;inset:0;z-index:1;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(150,215,255,0.04) 0px,rgba(150,215,255,0.04) 1px,transparent 1px,transparent 3px);mix-blend-mode:screen;animation:holoscan 9s linear infinite;"></div>
    <div style="position:absolute;left:50%;bottom:8%;width:min(60%,520px);height:2px;transform:translateX(-50%);background:linear-gradient(90deg,transparent,rgba(150,215,255,0.9),transparent);box-shadow:0 0 22px rgba(120,200,255,0.8);animation:holobase 4.5s ease-in-out infinite;z-index:1;pointer-events:none;"></div>
    <div style="position:relative;z-index:2;flex-shrink:0;display:flex;align-items:baseline;justify-content:space-between;gap:14px;padding:clamp(22px,4vh,44px) clamp(30px,6vw,84px) clamp(12px,2vh,20px);">
      <div id="sctitle" style="font-size:clamp(24px,3.2vw,36px);font-weight:600;letter-spacing:-0.02em;line-height:1;text-shadow:0.6px 0 rgba(255,80,140,0.25),-0.6px 0 rgba(90,210,255,0.35);">Roster</div>
      <span style="display:flex;align-items:center;gap:6px;font-family:'IBM Plex Mono',monospace;font-size:clamp(8px,1vw,10px);color:#8ef0c6;white-space:nowrap;flex-shrink:0;"><span style="width:5px;height:5px;border-radius:50%;background:#3ddc97;box-shadow:0 0 8px #3ddc97;"></span>PROJECTING</span>
    </div>
    <div id="scbody" class="hos" style="position:relative;z-index:2;flex:1;overflow-y:auto;padding:0 clamp(30px,6vw,84px) clamp(30px,5vh,60px);"></div>
  </div>
  <div id="holoRim" style="position:absolute;top:50%;left:50%;width:min(1040px,80vw);height:min(85vh,940px);z-index:6;pointer-events:none;transform:translate(-50%,-50%);animation:floaty 11s ease-in-out infinite;">
    <div style="position:absolute;inset:0;border-radius:60px;padding:1.4px;background:conic-gradient(from 0deg, transparent 0deg, rgba(150,215,255,0.55) 30deg, transparent 82deg, transparent 176deg, rgba(174,231,255,0.5) 208deg, transparent 262deg, transparent 360deg);-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;filter:blur(1px);opacity:0.42;animation:spin 15s linear infinite,holoflicker 6.5s ease-in-out infinite;"></div>
  </div>

  <button id="holobtn" title="Show / hide hologram" style="position:absolute;top:20px;left:20px;z-index:9;width:46px;height:46px;border-radius:50%;border:1px solid rgba(132,206,255,0.25);background:rgba(9,15,32,0.5);backdrop-filter:blur(16px);cursor:pointer;display:flex;align-items:center;justify-content:center;color:#cfe0ff;box-shadow:0 8px 24px rgba(0,0,0,0.4);">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" style="width:20px;height:20px;"><path d="M9 9L4 4M9 9V5.5M9 9H5.5M15 15l5 5M15 15v3.5M15 15h3.5"></path></svg>
  </button>

  <button id="layerbtn" title="Satellite / Map" style="position:absolute;bottom:20px;right:20px;z-index:9;width:54px;height:54px;border-radius:50%;border:1px solid rgba(132,206,255,0.3);background:rgba(9,15,32,0.55);backdrop-filter:blur(18px);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:#dbeeff;box-shadow:0 10px 28px rgba(0,0,0,0.45);">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="width:22px;height:22px;filter:drop-shadow(0 0 5px rgba(120,200,255,0.5));"><path d="M12 3l9 5-9 5-9-5 9-5zM3 13l9 5 9-5"></path></svg>
    <span id="layerlabel" class="m" style="font-size:7px;letter-spacing:0.12em;color:#aee7ff;">SAT</span>
  </button>

  <div style="position:absolute;bottom:14px;left:50%;transform:translateX(-50%);z-index:7;display:flex;align-items:center;gap:8px;padding:6px;border-radius:16px;background:rgba(9,15,32,0.55);border:1px solid rgba(255,255,255,0.09);backdrop-filter:blur(20px);box-shadow:0 14px 40px rgba(0,0,0,0.5);">
    <button id="modeglobe" class="modebtn" style="display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 22px;border-radius:12px;border:none;cursor:pointer;transition:all 0.22s;">
      <span style="font-size:13px;font-weight:600;">Globe</span><span class="m" style="font-size:8px;letter-spacing:0.1em;">SATELLITE</span>
    </button>
    <button id="modestreet" class="modebtn" style="display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 22px;border-radius:12px;border:none;cursor:pointer;transition:all 0.22s;">
      <span style="font-size:13px;font-weight:600;">Street</span><span class="m" style="font-size:8px;letter-spacing:0.1em;">ABOARD</span>
    </button>
  </div>

  <div id="loading" style="position:absolute;inset:0;z-index:9;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:rgba(3,5,10,0.6);backdrop-filter:blur(4px);">
    <div style="position:relative;width:58px;height:58px;"><div style="position:absolute;inset:0;border-radius:50%;border:2px solid rgba(90,140,255,0.18);border-top-color:#6c9bff;animation:spin 1s linear infinite;"></div></div>
    <div class="m" style="font-size:11px;letter-spacing:0.14em;color:rgba(150,180,255,0.7);">COMPILING SHADERS · MAPPING BLUE MARBLE…</div>
  </div>
</div>

<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ---------- state & real data ----------
// The mesh lives aboard GIIWEO — nodes carry no geolocation of their own, so every node is
// anchored at the boat with a small deterministic spread (hash of node id) so callouts and
// street mode can tell them apart. Adjust HOME when the boat moves oceans.
const HOME = { lat: 48.51, lon: -122.61, place: 'aboard GIIWEO' };
const S = { mode: 'globe', focusIdx: 0, activeScreen: 'roster', holoHidden: false, loading: true, view: null, linkOk: false, lastAnswerEcho: '' };

const $ = (id) => document.getElementById(id);
const esc = (s) => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const ago = (secs) => { const s = Math.max(0, secs|0); const d = s/86400|0, h = s%86400/3600|0, m = s%3600/60|0; return d? d+'d '+h+'h' : h? h+'h '+m+'m' : m? m+'m' : s+'s'; };
const dstr = (ts) => ts>0 ? new Date(ts*1000).toISOString().slice(0,10) : '—';
const nowS = () => Date.now()/1000|0;
const hash32 = (str) => { let h = 2166136261>>>0; for (const c of str) { h ^= c.charCodeAt(0); h = Math.imul(h, 16777619); } return h>>>0; };

function statusColor(st, kind) { return st === 'online' ? (kind === 'self_node' ? '#aee7ff' : '#3ddc97') : st === 'away' ? '#ffb15a' : 'rgba(140,160,190,0.55)'; }

// Members → the sphere's peers, self first, each with a deterministic offset around HOME.
function peers() {
  const v = S.view; if (!v || !v.members) return [];
  const ms = [...v.members].sort((a, b) => (a.kind === 'self_node' ? -1 : b.kind === 'self_node' ? 1 : 0));
  return ms.map((m) => {
    const h = hash32(m.node_id);
    const dLat = ((h & 0xffff) / 65535 - 0.5) * 0.05;          // ±~2.8 km — the fleet, not the world
    const dLon = (((h >>> 16) & 0xffff) / 65535 - 0.5) * 0.08;
    const st = m.status || (m.online ? 'online' : 'offline');
    return {
      m, name: m.label, lat: HOME.lat + dLat, lon: HOME.lon + dLon, status: st,
      color: statusColor(st, m.kind), local: m.kind === 'self_node',
      kindWord: { self_node: 'SELF', gossip_peer: 'PEER', device_peer: 'DEVICE', device_agent: 'AGENT' }[m.kind] || 'NODE',
      seen: st === 'online' ? 'now' : ago(nowS() - m.last_seen) + ' ago',
      session: m.session_start > 0 ? ago(nowS() - m.session_start) : '—',
      total: m.total_online_secs > 0 ? ago(m.total_online_secs) : '—',
      os: (m.os_version || m.os || '?') + (m.familiar_version ? ' · v' + m.familiar_version : ''),
    };
  });
}

// ---------- hologram screens (all real data) ----------
const SCREENS = ['conversation','roster','theories','work','signals','network','vision','controls'];
const SCTITLE = { conversation:'The dialogue', roster:'Roster', theories:'History of theories', work:'What it’s been doing', signals:'Signals', network:'Network', vision:'Vision', controls:'Control' };

function chip(t, color) { return `<span class="m" style="font-size:8px;letter-spacing:0.12em;padding:3px 8px;border-radius:6px;background:rgba(120,190,255,0.1);color:${color};">${esc(t)}</span>`; }

function renderScreen() {
  const v = S.view, el = $('scbody');
  $('sctitle').textContent = SCTITLE[S.activeScreen];
  if (!v) { el.innerHTML = `<div class="m" style="color:rgba(150,180,255,0.6);font-size:12px;">waiting for the familiar…</div>`; return; }
  const P = peers();
  const k = S.activeScreen;

  if (k === 'roster') {
    el.innerHTML = `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,300px),1fr));gap:14px;">` + P.map((p, i) => `
      <div class="card" style="background:${p.local?'rgba(90,175,255,0.1)':'rgba(20,44,80,0.2)'};border:1px solid ${p.local?'rgba(174,231,255,0.28)':'rgba(120,190,255,0.16)'};">
        <div style="display:flex;align-items:center;gap:9px;margin-bottom:4px;">
          <span style="width:9px;height:9px;border-radius:50%;background:${p.color};box-shadow:0 0 12px ${p.color};"></span>
          <span style="font-size:17px;font-weight:600;flex:1;letter-spacing:-0.01em;">${esc(p.name)}</span>
          ${chip(p.kindWord, p.local ? '#cdeeff' : '#bcd2ff')}
        </div>
        <div class="m" style="font-size:9.5px;color:rgba(160,195,255,0.58);margin-bottom:6px;">${esc(p.os)}</div>
        <div class="m" style="font-size:9.5px;color:rgba(160,195,255,0.58);margin-bottom:13px;">joined ${dstr(p.m.first_seen)}${p.m.human?' · serves '+esc(p.m.human):''}${p.m.interactive?' · interactive':''}${p.m.ai?' · ai':''}</div>
        <div style="display:flex;align-items:flex-end;gap:18px;margin-bottom:12px;">
          <div><div style="font-size:26px;font-weight:300;line-height:0.85;color:#e4f2ff;">${esc(p.seen)}</div><div class="m" style="font-size:7px;letter-spacing:0.14em;color:rgba(150,180,255,0.55);margin-top:5px;">SEEN</div></div>
          <div><div style="font-size:18px;font-weight:300;line-height:0.85;color:#aee7ff;">${esc(p.session)}</div><div class="m" style="font-size:7px;letter-spacing:0.14em;color:rgba(150,180,255,0.55);margin-top:5px;">SESSION</div></div>
          <div><div style="font-size:18px;font-weight:300;line-height:0.85;color:#9cc0ff;">${esc(p.total)}</div><div class="m" style="font-size:7px;letter-spacing:0.14em;color:rgba(150,180,255,0.55);margin-top:5px;">TOTAL ONLINE</div></div>
        </div>
        <div style="height:4px;border-radius:5px;background:rgba(255,255,255,0.06);overflow:hidden;margin-bottom:13px;"><div style="height:100%;width:${p.status==='online'?100:p.status==='away'?45:8}%;border-radius:5px;background:${p.color};box-shadow:0 0 8px ${p.color};"></div></div>
        <button onclick="sphereDive(${i})" style="width:100%;padding:9px;border-radius:11px;border:1px solid rgba(132,206,255,0.36);cursor:pointer;background:rgba(90,170,255,0.13);color:#dbeeff;font-size:12px;font-weight:600;">Drop to deck →</button>
      </div>`).join('') + `</div>`;

  } else if (k === 'conversation') {
    const msgs = [];
    for (const o of [...(v.recent || [])].reverse()) {
      if (o.context === 'console' || /told|asked|answered/.test(o.action)) {
        const human = o.actor !== 'familiar' && !o.actor.startsWith('mesh');
        msgs.push({ f: !human, text: o.object, t: o.ts });
      }
    }
    const q = (v.question || '').trim();
    if (q) msgs.push({ f: true, text: q, t: 0, isQ: true });
    el.innerHTML = `<div style="display:flex;flex-direction:column;gap:14px;max-width:760px;">` + msgs.slice(-14).map(mm => `
      <div style="align-self:${mm.f?'flex-start':'flex-end'};max-width:78%;padding:14px 17px;border-radius:16px;background:${mm.f?'rgba(20,44,80,0.3)':'rgba(90,170,255,0.12)'};border:1px solid ${mm.isQ?'rgba(174,231,255,0.5)':mm.f?'rgba(120,190,255,0.2)':'rgba(174,231,255,0.28)'};">
        <div class="m" style="font-size:9px;letter-spacing:0.14em;color:${mm.f?'rgba(170,215,255,0.8)':'rgba(200,224,255,0.7)'};margin-bottom:6px;">${mm.f ? (mm.isQ ? 'FAMILIAR · ASKS' : 'FAMILIAR') : 'YOU'}</div>
        <div style="font-size:clamp(14px,1.6vw,17px);line-height:1.5;color:rgba(232,240,252,0.92);">${esc(mm.text)}</div>
      </div>`).join('') + `</div>
      <div style="display:flex;gap:8px;max-width:760px;margin-top:18px;">
        <input id="convin" placeholder="${q ? 'answer…' : 'tell the familiar…'}" style="flex:1;padding:12px 15px;border-radius:12px;border:1px solid rgba(132,206,255,0.3);background:rgba(9,15,32,0.55);color:#eef2fb;font-size:14px;font-family:inherit;outline:none;">
        <button onclick="sphereSend()" style="padding:12px 20px;border-radius:12px;border:1px solid rgba(132,206,255,0.36);background:rgba(90,170,255,0.13);color:#dbeeff;font-size:13px;font-weight:600;cursor:pointer;">send</button>
      </div>`;
    const inp = $('convin');
    if (inp) inp.addEventListener('keydown', (e) => { if (e.key === 'Enter') window.sphereSend(); });

  } else if (k === 'theories') {
    const sc = (st) => st==='answered' ? '#3ddc97' : st==='pursued' ? '#6c9bff' : st==='open' ? '#ffb15a' : 'rgba(210,150,155,0.85)';
    const stage = (st) => ({ open:38, pursued:70, answered:100, abandoned:16, marginalized:10 }[st] ?? 30);
    el.innerHTML = `<div style="max-width:820px;">` + (v.theories || []).map(th => `
      <div style="position:relative;padding:16px 18px 16px 26px;border-radius:16px;background:rgba(16,34,60,0.28);border:1px solid rgba(120,190,255,0.14);margin-bottom:12px;">
        <span style="position:absolute;left:11px;top:20px;width:6px;height:6px;border-radius:50%;background:${sc(th.status)};box-shadow:0 0 10px ${sc(th.status)};"></span>
        <div style="display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:6px;">

}

// ---------- bridge to the app / daemon ----------
function toApp(kind, payload) {
  try { window.webkit.messageHandlers.sphere.postMessage({ kind, ...payload }); } catch (e) { /* browser preview: no bridge */ }
}
window.sphereScreen = (k) => { S.activeScreen = k; S.holoHidden = false; renderButtons(); renderChrome(); renderScreen(); };
window.sphereSend = () => { const inp = $('convin'); if (!inp || !inp.value.trim()) return; toApp('answer', { text: inp.value.trim() }); inp.value = ''; };
window.sphereGate = (gate, open) => toApp('gate', { gate, open: open === true || open === 'true' });
window.sphereUpdate = (view) => {
  S.view = view; S.linkOk = true;
  renderCallouts(); renderChrome(); renderScreen();
};
window.sphereLinkDown = (msg) => { S.linkOk = false; renderChrome(); };

$('holobtn').onclick = () => { S.holoHidden = !S.holoHidden; renderChrome(); };
$('layerbtn').onclick = () => { S.mode === 'street' ? setMode('globe') : window.sphereDive(S.focusIdx); };
$('modeglobe').onclick = () => setMode('globe');
$('modestreet').onclick = () => window.sphereDive(S.focusIdx);
function setMode(m) { S.mode = m; if (m === 'globe' && G.camera) { G.camera.position.setLength(3.5); G.controls.update(); } if (m === 'street') buildStreet(S.focusIdx); renderChrome(); }

// ---------- three.js globe (from the design, verbatim where possible) ----------
const G = { anchorDirs: [] };
const latLon = (lat, lon) => { const phi = (90 - lat) * Math.PI / 180, theta = (lon + 180) * Math.PI / 180; return new THREE.Vector3(-Math.sin(phi) * Math.cos(theta), Math.cos(phi), Math.sin(phi) * Math.sin(theta)).normalize(); };

window.sphereDive = (i) => {
  S.focusIdx = i; S.holoHidden = true; renderChrome();
  if (!G.group) { setMode('street'); return; }
  buildStreet(i);
  G.diveStartQ = G.group.quaternion.clone();
  G.diveTargetQ = new THREE.Quaternion().setFromUnitVectors(G.anchorDirs[i].clone(), new THREE.Vector3(0, 0, 1));
  G.diveFromZ = G.camera.position.length();
  G.diveT0 = performance.now();
  G.diving = true;
};

// street surface — procedural chart of the anchorage, seeded per node

function buildStreet(idx) {

function initThree() {
  const canvas = $('globe');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setClearColor(0x000000, 0);
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(40, 1, 0.1, 100);
  camera.position.set(0, 0, 3.5);
  const controls = new OrbitControls(camera, canvas);

  controls.enablePan = false; controls.minDistance = 2.05; controls.maxDistance = 6;
  controls.autoRotate = true; controls.autoRotateSpeed = 0.14; controls.rotateSpeed = 0.5;
  const group = new THREE.Group(); scene.add(group);
  Object.assign(G, { renderer, scene, camera, controls, group });

  const geo = new THREE.SphereGeometry(1, 256, 128);
  const mgr = new THREE.LoadingManager();
  const loader = new THREE.TextureLoader(mgr);
  const base = 'https://unpkg.com/three-globe/example/img/';
  const maxAniso = renderer.capabilities.getMaxAnisotropy();
  const dayTex = loader.load(base + 'earth-blue-marble.jpg');
  const topoTex = loader.load(base + 'earth-topology.png');
  const waterTex = loader.load(base + 'earth-water.png');
  const nightTex = loader.load(base + 'earth-night.jpg');
  dayTex.colorSpace = THREE.SRGBColorSpace; nightTex.colorSpace = THREE.SRGBColorSpace;
  [dayTex, topoTex, waterTex, nightTex].forEach(t => { t.anisotropy = maxAniso; });

  const sunDir = new THREE.Vector3(1, 0.28, 0.55).normalize();
  const earthMat = new THREE.MeshStandardMaterial({ map: dayTex, displacementMap: topoTex, displacementScale: 0.14, bumpMap: topoTex, bumpScale: 0.02, roughnessMap: waterTex, metalness: 0.02, roughness: 0.78, transparent: true, opacity: 1 });
  earthMat.onBeforeCompile = (sh) => {
    sh.uniforms.uSun = { value: sunDir }; sh.uniforms.uNight = { value: nightTex };
    earthMat.userData.sh = sh;
    sh.vertexShader = 'varying vec3 vWNormal;\n' + sh.vertexShader.replace('#include <worldpos_vertex>', '#include <worldpos_vertex>\n  vWNormal = normalize(mat3(modelMatrix) * normal);');
    sh.fragmentShader = 'uniform vec3 uSun; uniform sampler2D uNight; varying vec3 vWNormal;\n' + sh.fragmentShader
      .replace('#include <emissivemap_fragment>', `#include <emissivemap_fragment>

         float limbHaze = pow(clamp(dayF,0.0,1.0), 0.8) * pow(1.0 - abs(dot(normalize(vWNormal), normalize(vViewPosition))), 3.0);

  group.add(new THREE.Mesh(new THREE.SphereGeometry(1.006, 48, 30), new THREE.MeshBasicMaterial({ color: new THREE.Color('#8fd0ff'), wireframe: true, transparent: true, opacity: 0.06, depthWrite: false })));
  const atmoMat = new THREE.ShaderMaterial({ transparent: true, blending: THREE.AdditiveBlending, side: THREE.BackSide, depthWrite: false,
    uniforms: { uColor: { value: new THREE.Color('#3f82ff') }, uInt: { value: 0.25 } },
    vertexShader: 'varying vec3 vN; varying vec3 vE; void main(){ vN=normalize(normalMatrix*normal); vec4 mv=modelViewMatrix*vec4(position,1.0); vE=normalize(-mv.xyz); gl_Position=projectionMatrix*mv; }',
    fragmentShader: 'varying vec3 vN; varying vec3 vE; uniform vec3 uColor; uniform float uInt; void main(){ float f=pow(1.0-abs(dot(vN,vE)),3.0); gl_FragColor=vec4(uColor,f*uInt); }' });

  const key = new THREE.DirectionalLight(0xfff4e6, 1.75); key.position.copy(sunDir).multiplyScalar(5); scene.add(key);

  for (let i = 0; i < starN; i++) { const r = 16 + Math.random()*20, th = Math.random()*Math.PI*2, ph = Math.acos(2*Math.random() - 1); spr[i*3]=r*Math.sin(ph)*Math.cos(th); spr[i*3+1]=r*Math.sin(ph)*Math.sin(th); spr[i*3+2]=r*Math.cos(ph); }

  const resize = () => {

    fpsAcc += 1/Math.max(dt, 0.001); fpsN++; statT += dt;

}
