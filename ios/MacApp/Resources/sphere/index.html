<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<!--
  The Familiar — Metal Sphere console (from Claude Design "Familiar Metal Sphere.dc.html").
  Presentation layer only: the Swift host injects real worldview JSON via window.sphereUpdate()
  and relays human acts (answers, gate flips, street dives) through webkit.messageHandlers.
  The street surface is REAL Apple Maps — a native MKMapView the host crossfades in when the
  globe dive reaches map altitude; this page never fakes a map.
  Glyphs over words: controls are animated glyphs; text is data.
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:transparent;overflow:hidden;}
  a{color:#7aa2ff;text-decoration:none;}
  button{font-family:inherit;}
  ::-webkit-scrollbar{width:0;height:0;display:none;}
  .hos{scrollbar-width:none;-ms-overflow-style:none;}
  .hos::-webkit-scrollbar{width:0;height:0;display:none;}
  @keyframes aurora{0%{transform:translate(0,0) scale(1);}50%{transform:translate(3%,-2.5%) scale(1.06);}100%{transform:translate(0,0) scale(1);}}
  @keyframes ping{0%{opacity:0.8;transform:scale(0.5);}70%,100%{opacity:0;transform:scale(2.8);}}
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes floaty{0%,100%{transform:translate(-50%,-50%) translateY(0);}50%{transform:translate(-50%,-50%) translateY(-5px);}}
  @keyframes holoflicker{0%,100%{opacity:1;}45%{opacity:0.98;}47%{opacity:0.93;}49%{opacity:0.99;}72%{opacity:0.96;}74%{opacity:1;}}
  @keyframes holoscan{0%{background-position:0 0;}100%{background-position:0 -220px;}}
  @keyframes holobase{0%,100%{opacity:0.7;transform:translateX(-50%) scaleX(0.94);}50%{opacity:1;transform:translateX(-50%) scaleX(1.04);}}
  @keyframes eqb{0%,100%{transform:scaleY(0.45);}50%{transform:scaleY(1);}}
  @keyframes iconpulse{0%,100%{transform:scale(0.85);opacity:0.7;}50%{transform:scale(1.1);opacity:1;}}
  @keyframes dashmove{to{stroke-dashoffset:-144;}}
  @keyframes mer{0%,100%{transform:scaleX(0.2);}50%{transform:scaleX(1);}}
  @keyframes orbitspin{to{transform:rotate(360deg);}}
  @keyframes blink{0%,90%,100%{transform:scaleY(1);}94%{transform:scaleY(0.08);}}
  @keyframes knob{0%,100%{transform:translateX(-7px);}50%{transform:translateX(7px);}}
  @keyframes gatepulse{0%,100%{transform:scale(0.92);opacity:0.85;}50%{transform:scale(1.08);opacity:1;}}
  .scrbtn{position:absolute;transform:translate(-50%,-50%);z-index:8;display:flex;align-items:center;justify-content:center;width:clamp(58px,7.6vmin,94px);height:clamp(58px,7.6vmin,94px);border:none;border-radius:50%;cursor:pointer;transition:background 0.3s,transform 0.2s;background:transparent;}
  .scrbtn span.ic{position:relative;display:block;width:clamp(30px,4.4vmin,54px);height:clamp(30px,4.4vmin,54px);filter:drop-shadow(0 0 7px rgba(120,200,255,0.6));}
  .glybtn{border:1px solid rgba(132,206,255,0.25);background:rgba(9,15,32,0.5);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);cursor:pointer;display:flex;align-items:center;justify-content:center;color:#cfe0ff;box-shadow:0 8px 24px rgba(0,0,0,0.4);border-radius:50%;transition:background 0.2s,color 0.2s;}
  .glybtn.on{background:rgba(90,170,255,0.28);color:#f0f7ff;}
  .m{font-family:'IBM Plex Mono',monospace;}
</style>
</head>
<body>
<div id="root" style="position:relative;width:100vw;height:100vh;overflow:hidden;color:#eef2fb;font-family:'Space Grotesk',-apple-system,sans-serif;">

  <!-- space background — fades out when the native map surfaces -->
  <div id="space" style="position:absolute;inset:0;z-index:0;background:radial-gradient(130% 100% at 50% 0%, #0a1024 0%, #05070f 46%, #03050a 100%);transition:opacity 0.7s;">
    <div style="position:absolute;top:-16vh;left:-12vw;width:52vw;height:52vw;border-radius:50%;background:radial-gradient(circle,rgba(47,107,255,0.13),rgba(47,107,255,0) 68%);filter:blur(24px);animation:aurora 24s ease-in-out infinite;"></div>
    <div style="position:absolute;bottom:-20vh;right:-14vw;width:58vw;height:58vw;border-radius:50%;background:radial-gradient(circle,rgba(30,60,170,0.15),rgba(30,60,170,0) 66%);filter:blur(26px);animation:aurora 28s ease-in-out infinite reverse;"></div>
  </div>

  <canvas id="globe" style="position:absolute;inset:0;width:100%;height:100%;display:block;z-index:1;transition:opacity 0.7s;"></canvas>

  <div id="vignette" style="position:absolute;inset:0;pointer-events:none;z-index:2;background:radial-gradient(120% 90% at 50% 45%, transparent 52%, rgba(3,5,10,0.62) 100%);transition:opacity 0.7s;"></div>
  <div style="position:absolute;inset:0;z-index:2;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(150,215,255,0.026) 0px,rgba(150,215,255,0.026) 1px,transparent 1px,transparent 3px);mix-blend-mode:screen;animation:holoscan 11s linear infinite;"></div>

  <div id="callouts" style="position:absolute;inset:0;z-index:4;pointer-events:none;opacity:0;transition:opacity 0.5s;"></div>

  <!-- electric arcs OVER the real map: the host projects node coordinates to screen points
       (streetArcPoints) and this canvas draws the same lightning language in 2D -->
  <canvas id="streetArcs" style="position:absolute;inset:0;width:100%;height:100%;z-index:3;pointer-events:none;opacity:0;transition:opacity 1.6s;"></canvas>

  <!-- daemon-down badge: appears only when the link is lost (otherwise no chrome) -->
  <div id="linkdown" style="display:none;position:absolute;top:16px;left:50%;transform:translateX(-50%);z-index:9;flex-direction:column;align-items:center;gap:5px;">
    <div style="width:34px;height:34px;border-radius:50%;background:rgba(60,10,16,0.6);border:1px solid rgba(255,110,110,0.5);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;">
      <svg viewBox="0 0 24 24" fill="none" stroke="#ff6e6e" stroke-width="1.8" stroke-linecap="round" style="width:18px;height:18px;"><path d="M12 3v10"/><circle cx="12" cy="18.5" r="1.2" fill="#ff6e6e" stroke="none"/></svg>
    </div>
    <div id="linkmsg" class="m" style="max-width:70vw;font-size:9px;color:rgba(255,160,160,0.85);background:rgba(30,8,12,0.55);padding:3px 8px;border-radius:7px;text-align:center;"></div>
  </div>

  <div id="screenbtns"></div>

  <div id="holo" style="position:absolute;top:50%;left:50%;width:min(1040px,80vw);height:min(85vh,940px);z-index:6;display:flex;flex-direction:column;border-radius:60px;overflow:hidden;background:linear-gradient(158deg,rgba(20,44,80,0.128),rgba(8,20,40,0.056));backdrop-filter:blur(15px) saturate(1.35);-webkit-backdrop-filter:blur(15px) saturate(1.35);box-shadow:0 0 90px rgba(60,150,255,0.13);-webkit-mask-image:linear-gradient(180deg,transparent 0%,#000 11%,#000 89%,transparent 100%),linear-gradient(90deg,transparent 0%,#000 6%,#000 94%,transparent 100%);-webkit-mask-composite:source-in;-webkit-mask-repeat:no-repeat;animation:floaty 11s ease-in-out infinite,holoflicker 8s ease-in-out infinite;">
    <div style="position:absolute;inset:0;z-index:1;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(150,215,255,0.04) 0px,rgba(150,215,255,0.04) 1px,transparent 1px,transparent 3px);mix-blend-mode:screen;animation:holoscan 9s linear infinite;"></div>
    <div style="position:absolute;left:50%;bottom:8%;width:min(60%,520px);height:2px;transform:translateX(-50%);background:linear-gradient(90deg,transparent,rgba(150,215,255,0.9),transparent);box-shadow:0 0 22px rgba(120,200,255,0.8);animation:holobase 4.5s ease-in-out infinite;z-index:1;pointer-events:none;"></div>
    <div style="position:relative;z-index:2;flex-shrink:0;display:flex;align-items:baseline;justify-content:space-between;gap:14px;padding:clamp(22px,4vh,44px) clamp(30px,6vw,84px) clamp(12px,2vh,20px);">
      <div id="sctitle" style="font-size:clamp(24px,3.2vw,36px);font-weight:600;letter-spacing:-0.02em;line-height:1;text-shadow:0.6px 0 rgba(255,80,140,0.25),-0.6px 0 rgba(90,210,255,0.35);"></div>
      <span style="width:7px;height:7px;border-radius:50%;background:#3ddc97;box-shadow:0 0 10px #3ddc97;animation:iconpulse 2.4s ease-in-out infinite;flex-shrink:0;"></span>
    </div>
    <div id="scbody" class="hos" style="position:relative;z-index:2;flex:1;overflow-y:auto;padding:0 clamp(30px,6vw,84px) clamp(30px,5vh,60px);"></div>
  </div>
  <div id="holoRim" style="position:absolute;top:50%;left:50%;width:min(1040px,80vw);height:min(85vh,940px);z-index:6;pointer-events:none;transform:translate(-50%,-50%);animation:floaty 11s ease-in-out infinite;">
    <div style="position:absolute;inset:0;border-radius:60px;padding:1.4px;background:conic-gradient(from 0deg, transparent 0deg, rgba(150,215,255,0.55) 30deg, transparent 82deg, transparent 176deg, rgba(174,231,255,0.5) 208deg, transparent 262deg, transparent 360deg);-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;filter:blur(1px);opacity:0.42;animation:spin 15s linear infinite,holoflicker 6.5s ease-in-out infinite;"></div>
  </div>

  <!-- device/settings (glyph, top-right) -->
  <button id="devbtn" class="glybtn" title="device" style="position:absolute;top:20px;right:20px;z-index:9;width:46px;height:46px;">
    <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" style="width:24px;height:24px;overflow:visible;">
      <line x1="8" y1="15" x2="40" y2="15" stroke-width="2" opacity="0.4"/>
      <line x1="8" y1="24" x2="40" y2="24" stroke-width="2" opacity="0.4"/>
      <line x1="8" y1="33" x2="40" y2="33" stroke-width="2" opacity="0.4"/>
      <circle cx="18" cy="15" r="4" fill="currentColor" stroke="none" style="transform-box:fill-box;transform-origin:center;animation:knob 3.2s ease-in-out infinite;"/>
      <circle cx="30" cy="24" r="4" fill="currentColor" stroke="none" style="transform-box:fill-box;transform-origin:center;animation:knob 3.6s ease-in-out infinite reverse;"/>
      <circle cx="22" cy="33" r="4" fill="currentColor" stroke="none" style="transform-box:fill-box;transform-origin:center;animation:knob 3s ease-in-out infinite 0.4s;"/>
    </svg>
  </button>

  <!-- hologram show/hide (glyph) -->
  <button id="holobtn" class="glybtn" title="hologram" style="position:absolute;top:20px;left:20px;z-index:9;width:46px;height:46px;">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" style="width:20px;height:20px;"><path d="M9 9L4 4M9 9V5.5M9 9H5.5M15 15l5 5M15 15v3.5M15 15h3.5"></path></svg>
  </button>

  <!-- ONE surface control: shows the surface you'd dive to -->
  <button id="modetoggle" class="glybtn" title="surface" style="position:absolute;bottom:16px;left:50%;transform:translateX(-50%);z-index:7;width:56px;height:56px;">
    <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" style="width:32px;height:32px;overflow:visible;">
      <path d="M8 40 L18 8 M30 8 L40 40" stroke-width="1.6" opacity="0.7"/>
      <path d="M12 30 H36 M15 20 H33" stroke-width="1.3" opacity="0.5"/>
      <circle cx="24" cy="25" r="3.4" fill="currentColor" stroke="none" style="transform-box:fill-box;transform-origin:center;animation:iconpulse 2.4s ease-in-out infinite;"/>
      <path d="M24 25 v10" stroke-width="1.4" stroke-dasharray="2 3" style="animation:dashmove 1.6s linear infinite;"/>
    </svg>
  </button>

  <!-- loading: spinner only -->
  <div id="loading" style="position:absolute;inset:0;z-index:9;display:flex;align-items:center;justify-content:center;background:rgba(3,5,10,0.6);backdrop-filter:blur(4px);">
    <div style="position:relative;width:58px;height:58px;"><div style="position:absolute;inset:0;border-radius:50%;border:2px solid rgba(90,140,255,0.18);border-top-color:#6c9bff;animation:spin 1s linear infinite;"></div></div>
  </div>
</div>

<script type="importmap">

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ---------- state & real data ----------
const S = { mode: 'globe', focusIdx: 0, activeScreen: 'roster', holoHidden: false, loading: true, view: null, linkOk: false, builtScreen: '' };

const $ = (id) => document.getElementById(id);
const esc = (s) => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const ago = (secs) => { const s = Math.max(0, secs|0); const d = s/86400|0, h = s%86400/3600|0, m = s%3600/60|0; return d? d+'d '+h+'h' : h? h+'h '+m+'m' : m? m+'m' : s+'s'; };
const dstr = (ts) => ts>0 ? new Date(ts*1000).toISOString().slice(0,10) : '—';
const nowS = () => Date.now()/1000|0;
const hash32 = (str) => { let h = 2166136261>>>0; for (const c of str) { h ^= c.charCodeAt(0); h = Math.imul(h, 16777619); } return h>>>0; };

function statusColor(st, kind) { return st === 'online' ? (kind === 'self_node' ? '#aee7ff' : '#3ddc97') : st === 'away' ? '#ffb15a' : 'rgba(140,160,190,0.55)'; }
const FRONTIER_COLOR = '#7d93a8';

// Members → located mesh nodes. Real coordinates only: a node that reported none clusters
// near the anchor (first located member) with a small deterministic spread, and its card
// says the position is approximate. No invented places.
function peers() {
  const v = S.view; if (!v || !v.members) return [];
  const ms = [...v.members].sort((a, b) => (a.kind === 'self_node' ? -1 : b.kind === 'self_node' ? 1 : 0));
  const anchor = ms.find(m => (m.lat || 0) !== 0 || (m.lon || 0) !== 0);
  return ms.map((m) => {
    const st = m.status || (m.online ? 'online' : 'offline');
    let lat = m.lat || 0, lon = m.lon || 0, located = lat !== 0 || lon !== 0;
    if (!located && anchor) {
      const h = hash32(m.node_id);
      lat = anchor.lat + ((h & 0xffff) / 65535 - 0.5) * 0.02;
      lon = anchor.lon + (((h >>> 16) & 0xffff) / 65535 - 0.5) * 0.03;
    }
    return {
      m, name: m.label, lat, lon, located, hasAnchor: !!anchor, status: st,
      color: statusColor(st, m.kind), local: m.kind === 'self_node',
      kindWord: { self_node: 'SELF', gossip_peer: 'PEER', device_peer: 'DEVICE', device_agent: 'AGENT' }[m.kind] || 'NODE',
      seen: st === 'online' ? 'now' : ago(nowS() - m.last_seen) + ' ago',
      session: m.session_start > 0 ? ago(nowS() - m.session_start) : '—',
      total: m.total_online_secs > 0 ? ago(m.total_online_secs) : '—',
      os: (m.os_version || m.os || '?') + (m.familiar_version ? ' · v' + m.familiar_version : ''),
    };
  });
}

// The frontier: discovered-but-not-yet-contributing devices/services/paths. Smaller, faded,
// arcs dimmer and a different color — known, not yet part of the mesh's body.
function frontierNodes() {
  const v = S.view; if (!v || !v.frontier) return [];
  const P = peers();
  const anchor = P.find(p => p.located);
  return v.frontier.slice(0, 12).map(f => {
    const h = hash32(f.label + f.ip);
    return {
      f, name: f.label || f.ip, ip: f.ip, reach: f.reach,
      lat: anchor ? anchor.lat + ((h & 0xffff) / 65535 - 0.5) * 0.045 : 0,
      lon: anchor ? anchor.lon + (((h >>> 16) & 0xffff) / 65535 - 0.5) * 0.06 : 0,
      located: !!anchor,
    };
  });
}

// ---------- glyph library ----------
const GLYPHS = {
  conversation: `<svg viewBox="0 0 48 48" style="width:100%;height:100%;overflow:visible;"><path d="M9 13h30a4 4 0 0 1 4 4v11a4 4 0 0 1-4 4H23l-9 6v-6h-5a4 4 0 0 1-4-4V17a4 4 0 0 1 4-4z" fill="currentColor" fill-opacity="0.1" stroke="currentColor" stroke-width="1.6"/><rect x="16" y="18" width="3" height="11" rx="1.5" fill="currentColor" style="transform-box:fill-box;transform-origin:center bottom;animation:eqb 1.1s ease-in-out infinite;"/><rect x="22.5" y="18" width="3" height="11" rx="1.5" fill="currentColor" style="transform-box:fill-box;transform-origin:center bottom;animation:eqb 1.1s ease-in-out infinite 0.22s;"/><rect x="29" y="18" width="3" height="11" rx="1.5" fill="currentColor" style="transform-box:fill-box;transform-origin:center bottom;animation:eqb 1.1s ease-in-out infinite 0.44s;"/></svg>`,
  roster: `<svg viewBox="0 0 48 48" style="width:100%;height:100%;overflow:visible;"><g style="transform-box:fill-box;transform-origin:center;animation:spin 16s linear infinite;"><line x1="24" y1="24" x2="24" y2="8" stroke="currentColor" stroke-width="1.3" opacity="0.45"/><line x1="24" y1="24" x2="39" y2="32" stroke="currentColor" stroke-width="1.3" opacity="0.45"/><line x1="24" y1="24" x2="11" y2="34" stroke="currentColor" stroke-width="1.3" opacity="0.45"/><circle cx="24" cy="8" r="3" fill="currentColor"/><circle cx="39" cy="32" r="3" fill="currentColor"/><circle cx="11" cy="34" r="3" fill="currentColor"/></g><circle cx="24" cy="24" r="4.2" fill="currentColor" style="transform-box:fill-box;transform-origin:center;animation:iconpulse 2.8s ease-in-out infinite;"/></svg>`,
  theories: `<svg viewBox="0 0 48 48" style="width:100%;height:100%;overflow:visible;"><circle cx="24" cy="24" r="6" fill="currentColor" style="transform-box:fill-box;transform-origin:center;animation:iconpulse 2.6s ease-in-out infinite;"/><g style="transform-box:fill-box;transform-origin:center;animation:spin 9s linear infinite;"><circle cx="24" cy="24" r="13" fill="none" stroke="currentColor" stroke-width="1.4" stroke-dasharray="3 6" opacity="0.6"/><circle cx="24" cy="11" r="2" fill="currentColor"/><circle cx="37" cy="28" r="2" fill="currentColor"/><circle cx="12" cy="29" r="2" fill="currentColor"/></g></svg>`,
  work: `<svg viewBox="0 0 48 48" style="width:100%;height:100%;overflow:visible;"><path d="M3 24h9l3-12 5 24 4-15 3 7h18" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="72 72" style="animation:dashmove 1.7s linear infinite;"/></svg>`,
  signals: `<svg viewBox="0 0 48 48" style="width:100%;height:100%;overflow:visible;"><rect x="7" y="12" width="5.5" height="24" rx="2.5" fill="currentColor" style="transform-box:fill-box;transform-origin:center bottom;animation:eqb 1.2s ease-in-out infinite;"/><rect x="16" y="12" width="5.5" height="24" rx="2.5" fill="currentColor" style="transform-box:fill-box;transform-origin:center bottom;animation:eqb 1.2s ease-in-out infinite 0.25s;"/><rect x="25" y="12" width="5.5" height="24" rx="2.5" fill="currentColor" style="transform-box:fill-box;transform-origin:center bottom;animation:eqb 1.2s ease-in-out infinite 0.5s;"/><rect x="34" y="12" width="5.5" height="24" rx="2.5" fill="currentColor" style="transform-box:fill-box;transform-origin:center bottom;animation:eqb 1.2s ease-in-out infinite 0.75s;"/></svg>`,
  network: `<svg viewBox="0 0 48 48" style="width:100%;height:100%;overflow:visible;"><circle cx="24" cy="24" r="14" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.75"/><ellipse cx="24" cy="24" rx="14" ry="5" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.5"/><ellipse cx="24" cy="24" rx="5" ry="14" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.5" style="transform-box:fill-box;transform-origin:center;animation:mer 5s ease-in-out infinite;"/><g style="transform-box:fill-box;transform-origin:center;animation:orbitspin 6s linear infinite;"><circle cx="24" cy="6" r="2.6" fill="currentColor"/></g></svg>`,
  vision: `<svg viewBox="0 0 48 48" style="width:100%;height:100%;overflow:visible;"><g style="transform-box:fill-box;transform-origin:center;animation:blink 5s ease-in-out infinite;"><path d="M4 24s7-11 20-11 20 11 20 11-7 11-20 11S4 24 4 24z" fill="currentColor" fill-opacity="0.1" stroke="currentColor" stroke-width="1.6"/><g style="transform-box:fill-box;transform-origin:center;animation:spin 7s linear infinite;"><circle cx="24" cy="24" r="7.5" fill="none" stroke="currentColor" stroke-width="1.4" stroke-dasharray="2 4"/></g><circle cx="24" cy="24" r="4" fill="currentColor" style="transform-box:fill-box;transform-origin:center;animation:iconpulse 3s ease-in-out infinite;"/></g></svg>`,
  controls: `<svg viewBox="0 0 48 48" style="width:100%;height:100%;overflow:visible;"><line x1="8" y1="15" x2="40" y2="15" stroke="currentColor" stroke-width="2" opacity="0.4"/><line x1="8" y1="24" x2="40" y2="24" stroke="currentColor" stroke-width="2" opacity="0.4"/><line x1="8" y1="33" x2="40" y2="33" stroke="currentColor" stroke-width="2" opacity="0.4"/><circle cx="24" cy="15" r="4" fill="currentColor" style="transform-box:fill-box;transform-origin:center;animation:knob 3s ease-in-out infinite;"/><circle cx="24" cy="24" r="4" fill="currentColor" style="transform-box:fill-box;transform-origin:center;animation:knob 3.4s ease-in-out infinite 0.5s;"/><circle cx="24" cy="33" r="4" fill="currentColor" style="transform-box:fill-box;transform-origin:center;animation:knob 3s ease-in-out infinite reverse;"/></svg>`,
};
// dive-to-surface glyph (map pin descending) and send glyph (plane) — controls, wordless
const DIVE_GLYPH = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" style="width:19px;height:19px;"><path d="M12 21s-7-6.2-7-11a7 7 0 0 1 14 0c0 4.8-7 11-7 11z"/><circle cx="12" cy="10" r="2.6" fill="currentColor" stroke="none" style="transform-box:fill-box;transform-origin:center;animation:iconpulse 2.2s ease-in-out infinite;"/></svg>`;
const SEND_GLYPH = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" style="width:19px;height:19px;"><path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4z"/></svg>`;
const gateGlyph = (on) => `<svg viewBox="0 0 24 24" fill="none" style="width:22px;height:22px;">
  <circle cx="12" cy="12" r="9" stroke="${on ? '#3ddc97' : '#ff6e6e'}" stroke-width="1.4" opacity="0.5" stroke-dasharray="${on ? 'none' : '2 3'}" style="transform-box:fill-box;transform-origin:center;${on ? '' : 'animation:spin 8s linear infinite;'}"/>
  <circle cx="12" cy="12" r="4.4" fill="${on ? '#3ddc97' : '#ff6e6e'}" style="transform-box:fill-box;transform-origin:center;animation:gatepulse ${on ? '2.2s' : '3.4s'} ease-in-out infinite;"/>
</svg>`;

// ---------- hologram screens (real data; skeleton built once per screen, data refreshed in place) ----------
const SCREENS = ['conversation','roster','theories','work','signals','network','vision','controls'];
const SCTITLE = { conversation:'Dialogue', roster:'Roster', theories:'Theories', work:'Activity', signals:'Signals', network:'Network', vision:'Vision', controls:'Gates', node:'', device:'Device' };

function chip(t, color) { return `<span class="m" style="font-size:8px;letter-spacing:0.12em;padding:3px 8px;border-radius:6px;background:rgba(120,190,255,0.1);color:${color};">${esc(t)}</span>`; }

function buildScreen() {
  const el = $('scbody');
  $('sctitle').textContent = S.activeScreen === 'node' ? (peers()[S.nodeIdx]?.name ?? '') : SCTITLE[S.activeScreen];
  S.builtScreen = S.activeScreen;
  if (S.activeScreen === 'conversation') {
    // Persistent skeleton: the input row is created ONCE and survives data refreshes, so
    // typing is never interrupted by the poll cycle.
    el.innerHTML = `
      <div id="convmsgs" style="display:flex;flex-direction:column;gap:14px;max-width:760px;"></div>
      <div style="display:flex;gap:8px;max-width:760px;margin-top:18px;">
        <input id="convin" style="flex:1;padding:12px 15px;border-radius:12px;border:1px solid rgba(132,206,255,0.3);background:rgba(9,15,32,0.55);color:#eef2fb;font-size:14px;font-family:inherit;outline:none;">
        <button id="convsend" class="glybtn" style="width:46px;height:46px;border-radius:12px;flex-shrink:0;">${SEND_GLYPH}</button>
      </div>`;
    $('convin').addEventListener('keydown', (e) => { if (e.key === 'Enter') window.sphereSend(); });
    $('convsend').onclick = () => window.sphereSend();
  } else {
    el.innerHTML = `<div id="scdata"></div>`;
  }
  refreshScreen();
}

function refreshScreen() {
  const v = S.view;
  if (S.builtScreen !== S.activeScreen) { buildScreen(); return; }
  const k = S.activeScreen;

  if (k === 'conversation') {
    const box = $('convmsgs'); if (!box) return;
    if (!v) { box.innerHTML = ''; return; }
    const msgs = [];
    for (const o of [...(v.recent || [])].reverse()) {
      if (o.context === 'console' || /told|asked|answered/.test(o.action)) {
        const human = o.actor !== 'familiar' && !o.actor.startsWith('mesh');
        msgs.push({ f: !human, text: o.object });
      }
    }
    const q = (v.question || '').trim();
    if (q) msgs.push({ f: true, text: q, isQ: true });
    const html = msgs.slice(-14).map(mm => `
      <div style="align-self:${mm.f?'flex-start':'flex-end'};max-width:78%;padding:14px 17px;border-radius:16px;background:${mm.f?'rgba(20,44,80,0.3)':'rgba(90,170,255,0.12)'};border:1px solid ${mm.isQ?'rgba(174,231,255,0.5)':mm.f?'rgba(120,190,255,0.2)':'rgba(174,231,255,0.28)'};">
        <div style="font-size:clamp(14px,1.6vw,17px);line-height:1.5;color:rgba(232,240,252,0.92);">${esc(mm.text)}</div>
      </div>`).join('');
    if (box.dataset.html !== html) { box.dataset.html = html; box.innerHTML = html; }
    return;
  }

  const el = $('scdata'); if (!el || !v) return;
  const P = peers();

  if (k === 'roster') {
    el.innerHTML = `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,300px),1fr));gap:14px;">` + P.map((p, i) => `
      <div onclick="sphereNode(${i})" style="cursor:pointer;padding:16px 17px;border-radius:16px;background:${p.local?'rgba(90,175,255,0.1)':'rgba(20,44,80,0.2)'};border:1px solid ${p.local?'rgba(174,231,255,0.28)':'rgba(120,190,255,0.16)'};">
        <div style="display:flex;align-items:center;gap:9px;margin-bottom:4px;">
          <span style="width:9px;height:9px;border-radius:50%;background:${p.color};box-shadow:0 0 12px ${p.color};"></span>
          <span style="font-size:17px;font-weight:600;flex:1;letter-spacing:-0.01em;">${esc(p.name)}</span>
          ${chip(p.kindWord, p.local ? '#cdeeff' : '#bcd2ff')}
        </div>
        <div class="m" style="font-size:9.5px;color:rgba(160,195,255,0.58);margin-bottom:6px;">${esc(p.os)}</div>
        <div class="m" style="font-size:9.5px;color:rgba(160,195,255,0.58);margin-bottom:13px;">${dstr(p.m.first_seen)}${p.m.human?' · '+esc(p.m.human):''}${p.m.ai?' · ai':''} · ${p.located ? p.lat.toFixed(3)+'°, '+p.lon.toFixed(3)+'°' : p.hasAnchor ? '≈' : '—'}</div>
        <div style="display:flex;align-items:flex-end;gap:18px;margin-bottom:12px;">
          <div><div style="font-size:26px;font-weight:300;line-height:0.85;color:#e4f2ff;">${esc(p.seen)}</div><div class="m" style="font-size:7px;letter-spacing:0.14em;color:rgba(150,180,255,0.55);margin-top:5px;">SEEN</div></div>
          <div><div style="font-size:18px;font-weight:300;line-height:0.85;color:#aee7ff;">${esc(p.session)}</div><div class="m" style="font-size:7px;letter-spacing:0.14em;color:rgba(150,180,255,0.55);margin-top:5px;">SESSION</div></div>
          <div><div style="font-size:18px;font-weight:300;line-height:0.85;color:#9cc0ff;">${esc(p.total)}</div><div class="m" style="font-size:7px;letter-spacing:0.14em;color:rgba(150,180,255,0.55);margin-top:5px;">TOTAL</div></div>
        </div>
        <div style="height:4px;border-radius:5px;background:rgba(255,255,255,0.06);overflow:hidden;margin-bottom:13px;"><div style="height:100%;width:${p.status==='online'?100:p.status==='away'?45:8}%;border-radius:5px;background:${p.color};box-shadow:0 0 8px ${p.color};"></div></div>
        <button onclick="event.stopPropagation();sphereDive(${i})" class="glybtn" style="width:100%;height:38px;border-radius:11px;">${DIVE_GLYPH}</button>
      </div>`).join('') + `</div>`;

  } else if (k === 'node') {
    const p = P[S.nodeIdx]; if (!p) { window.sphereScreen('roster'); return; }
    const m = p.m;
    const row = (label, val) => val ? `<div style="display:flex;justify-content:space-between;gap:14px;padding:10px 0;border-bottom:1px solid rgba(120,190,255,0.08);"><span class="m" style="font-size:9px;letter-spacing:0.14em;color:rgba(150,180,255,0.55);align-self:center;">${label}</span><span style="font-size:14px;color:rgba(232,240,252,0.9);text-align:right;">${esc(val)}</span></div>` : '';
    el.innerHTML = `<div style="max-width:640px;">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:6px;">
        <button onclick="sphereScreen('roster')" class="glybtn" style="width:34px;height:34px;flex-shrink:0;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px;"><path d="M15 18l-6-6 6-6"/></svg></button>
        <span style="width:11px;height:11px;border-radius:50%;background:${p.color};box-shadow:0 0 14px ${p.color};"></span>
        ${chip(p.kindWord, p.local ? '#cdeeff' : '#bcd2ff')}
        ${m.ai ? chip('AI', '#c9a3ff') : ''}
        ${m.trust && m.trust !== 'trusted' ? chip(m.trust.toUpperCase(), '#ff8fa3') : ''}
        <span style="flex:1;"></span>
        <button onclick="sphereDive(${S.nodeIdx})" class="glybtn" style="width:44px;height:44px;">${DIVE_GLYPH}</button>
      </div>
      <div style="display:flex;align-items:flex-end;gap:26px;margin:16px 0 20px;">
        <div><div style="font-size:34px;font-weight:300;line-height:0.85;color:#e4f2ff;">${esc(p.seen)}</div><div class="m" style="font-size:7.5px;letter-spacing:0.14em;color:rgba(150,180,255,0.55);margin-top:6px;">SEEN</div></div>
        <div><div style="font-size:24px;font-weight:300;line-height:0.85;color:#aee7ff;">${esc(p.session)}</div><div class="m" style="font-size:7.5px;letter-spacing:0.14em;color:rgba(150,180,255,0.55);margin-top:6px;">SESSION</div></div>
        <div><div style="font-size:24px;font-weight:300;line-height:0.85;color:#9cc0ff;">${esc(p.total)}</div><div class="m" style="font-size:7.5px;letter-spacing:0.14em;color:rgba(150,180,255,0.55);margin-top:6px;">TOTAL</div></div>
      </div>
      ${row('SYSTEM', p.os)}
      ${row('JOINED', dstr(m.first_seen))}
      ${row('HUMAN', (m.human || '') + (m.interactive ? ' · interactive' : ''))}
      ${row('POSITION', p.located ? p.lat.toFixed(4)+'°, '+p.lon.toFixed(4)+'°' : p.hasAnchor ? '≈ near mesh' : '—')}
      ${row('ADDRESS', m.addr)}
      ${row('OFFERS', (m.tools||0) + ' tools · ' + (m.patterns||0) + ' patterns')}
      ${row('ROLE', m.relationship)}
      ${row('LAST', m.detail)}
    </div>`;

  } else if (k === 'theories') {
    const sc = (st) => st==='answered' ? '#3ddc97' : st==='pursued' ? '#6c9bff' : st==='open' ? '#ffb15a' : 'rgba(210,150,155,0.85)';
    const stage = (st) => ({ open:38, pursued:70, answered:100, abandoned:16, marginalized:10 }[st] ?? 30);
    el.innerHTML = `<div style="max-width:820px;">` + (v.theories || []).map(th => `
      <div style="position:relative;padding:16px 18px 16px 26px;border-radius:16px;background:rgba(16,34,60,0.28);border:1px solid rgba(120,190,255,0.14);margin-bottom:12px;">
        <span style="position:absolute;left:11px;top:20px;width:6px;height:6px;border-radius:50%;background:${sc(th.status)};box-shadow:0 0 10px ${sc(th.status)};"></span>
        <div style="display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:6px;">
          <span style="font-size:clamp(15px,1.7vw,18px);font-weight:600;letter-spacing:-0.01em;line-height:1.25;">${esc(th.theory)}</span>
          <span class="m" style="font-size:9px;letter-spacing:0.06em;color:rgba(150,180,255,0.5);white-space:nowrap;">${th.status} ${dstr(th.status_at || th.created_at)}</span>
        </div>
        <div style="font-size:13px;color:rgba(226,232,246,0.62);line-height:1.5;margin-bottom:11px;">${esc(th.question)}</div>
        <div style="display:flex;align-items:center;gap:12px;">
          <div style="flex:1;height:5px;border-radius:5px;background:rgba(255,255,255,0.06);overflow:hidden;"><div style="height:100%;width:${stage(th.status)}%;border-radius:5px;background:${sc(th.status)};box-shadow:0 0 8px ${sc(th.status)};"></div></div>
          <span class="m" style="font-size:9px;color:rgba(150,180,255,0.6);">${dstr(th.created_at)}${th.last_worked_at>0?' → '+dstr(th.last_worked_at):''}</span>
        </div>
      </div>`).join('') + `</div>`;

  } else if (k === 'work') {
    const kindOf = (o) => /discover/.test(o.action) ? 'OBSERVE' : /theor/.test(o.action) ? 'THEORY' : /told|answer/.test(o.action) ? 'ANSWER' : /reach|presence|reports/.test(o.action) ? 'SYNC' : /cultivat|learn/.test(o.action) ? 'LEARN' : 'OBSERVE';
    const wkColor = { OBSERVE:'#aee7ff', THEORY:'#8fb4ff', ANSWER:'#3ddc97', LEARN:'#c9a3ff', SYNC:'#6c9bff' };
    el.innerHTML = `<div style="max-width:820px;">` + (v.recent || []).slice(0, 24).map(o => { const kk = kindOf(o); return `
      <div style="display:flex;align-items:flex-start;gap:14px;padding:13px 16px;border-radius:14px;background:rgba(16,34,60,0.24);border:1px solid rgba(120,190,255,0.12);margin-bottom:9px;">
        <span style="width:8px;height:8px;border-radius:50%;background:${wkColor[kk]};box-shadow:0 0 9px ${wkColor[kk]};flex-shrink:0;margin-top:6px;"></span>
        <div style="flex:1;"><div style="font-size:clamp(13px,1.5vw,15px);line-height:1.4;color:rgba(232,240,252,0.9);">${esc(o.actor)} ${esc(o.action)} ${esc(o.object)}</div></div>
        <span class="m" style="font-size:9px;color:rgba(150,180,255,0.5);flex-shrink:0;">${ago(nowS() - o.ts)}</span>
      </div>`; }).join('') + `</div>`;

  } else if (k === 'signals') {
    const rows = [
      { label:'Service',  v:v.service,  color:'#4d82ff', glow:'rgba(77,130,255,0.6)' },
      { label:'Presence', v:v.presence, color:'#3ddc97', glow:'rgba(61,220,151,0.5)' },
      { label:'Capacity', v:v.capacity, color:'#ffb15a', glow:'rgba(255,177,90,0.5)' },
    ];
    el.innerHTML = `<div style="max-width:720px;">` + rows.map(sg => `
      <div style="margin-bottom:20px;">
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px;"><span style="font-size:clamp(15px,1.7vw,18px);font-weight:600;">${sg.label}</span><span class="m" style="font-size:14px;color:${sg.color};">${(sg.v ?? 0).toFixed(2)}</span></div>
        <div style="height:8px;border-radius:8px;background:rgba(255,255,255,0.07);overflow:hidden;"><div style="height:100%;width:${Math.round((sg.v??0)*100)}%;border-radius:8px;background:${sg.color};box-shadow:0 0 14px ${sg.glow};"></div></div>
      </div>`).join('') + `
      <div style="margin-top:8px;padding:16px 18px;border-radius:14px;background:${v.withdrawn?'rgba(255,110,110,0.1)':'rgba(61,220,151,0.08)'};border:1px solid ${v.withdrawn?'rgba(255,110,110,0.3)':'rgba(61,220,151,0.24)'};display:flex;align-items:center;gap:11px;">
        <span style="width:8px;height:8px;border-radius:50%;background:${v.withdrawn?'#ff6e6e':'#3ddc97'};box-shadow:0 0 10px ${v.withdrawn?'#ff6e6e':'#3ddc97'};animation:iconpulse 2.6s ease-in-out infinite;"></span>
        <span class="m" style="font-size:11px;color:rgba(226,240,236,0.8);">${v.withdrawn ? 'WITHDRAWN' : ''} ${(Object.entries({llm:v.gates?.llm,camera:v.gates?.camera,net:v.gates?.network,mesh:v.gates?.mesh,exec:v.gates?.execute,agent:v.gates?.agent,tools:v.gates?.tool_install}).filter(([,x])=>x).map(([n])=>n).join(' ')) || '—'}</span>
      </div></div>`;

  } else if (k === 'network') {
    const F = frontierNodes();
    const on = P.filter(p => p.status === 'online').length;
    const stats = [
      { val:String(P.length), color:'#e4f2ff' }, { val:String(on), color:'#8ef0c6' },
      { val:String(v.observation_count ?? 0), color:'#aee7ff' },
      { val:String(v.tick ?? 0), color:'#9cc0ff' }, { val:ago(v.uptime_secs ?? 0), color:'#bcd2ff' },
    ];
    const labels = ['NODES','ONLINE','OBS','TICK','UPTIME'];
    el.innerHTML = `<div><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:22px;">` + stats.map((n, i) => `
      <div style="padding:16px;border-radius:14px;background:rgba(16,34,60,0.28);border:1px solid rgba(120,190,255,0.14);text-align:center;">
        <div class="m" style="font-size:clamp(20px,2.6vw,28px);font-weight:600;color:${n.color};text-shadow:0 0 14px rgba(120,200,255,0.4);">${n.val}</div>
        <div class="m" style="font-size:8px;letter-spacing:0.16em;color:rgba(150,180,255,0.55);margin-top:6px;">${labels[i]}</div>
      </div>`).join('') + `</div><div style="display:flex;flex-direction:column;gap:8px;">` + P.map((p, i) => `
      <div onclick="sphereDive(${i})" style="cursor:pointer;display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:12px;background:rgba(16,34,60,0.2);border:1px solid rgba(120,190,255,0.1);">
        <span style="width:8px;height:8px;border-radius:50%;background:${p.color};box-shadow:0 0 10px ${p.color};"></span>
        <span style="font-size:14px;font-weight:600;flex:1;">${esc(p.name)}</span>
        <span class="m" style="font-size:10px;color:rgba(160,195,255,0.6);">${esc(p.m.addr || '')}</span>
        <span class="m" style="font-size:11px;color:${p.color};min-width:52px;text-align:right;">${esc(p.seen)}</span>
      </div>`).join('') + F.map((fn, fi) => `
      <div onclick="sphereDiveFrontier(${fi})" style="cursor:pointer;display:flex;align-items:center;gap:12px;padding:9px 14px;border-radius:12px;background:rgba(16,34,60,0.12);border:1px solid rgba(125,147,168,0.14);opacity:0.66;">
        <span style="width:6px;height:6px;border-radius:50%;background:${FRONTIER_COLOR};box-shadow:0 0 7px ${FRONTIER_COLOR};"></span>
        <span style="font-size:12.5px;flex:1;color:rgba(220,230,240,0.75);">${esc(fn.name)}</span>
        <span class="m" style="font-size:9px;color:rgba(160,180,200,0.55);">${esc(fn.ip)} · ${esc(fn.reach)}</span>
      </div>`).join('') + `</div>` + ((v.hosts||[]).length ? `<div class="m" style="margin-top:14px;font-size:10px;color:rgba(150,180,255,0.55);">${v.hosts.map(esc).join(' · ')}</div>` : '') + `</div>`;

  } else if (k === 'vision') {
    const camOn = !!(v.gates && v.gates.camera);
    el.innerHTML = `<div style="max-width:760px;">
      <div style="display:flex;align-items:center;gap:14px;padding:15px 17px;border-radius:14px;background:rgba(16,34,60,0.26);border:1px solid ${camOn?'rgba(61,220,151,0.4)':'rgba(120,190,255,0.14)'};margin-bottom:10px;">
        <span style="flex-shrink:0;color:${camOn?'#3ddc97':'#6c9bff'};">${GLYPHS.vision}</span>
        <div style="flex:1;"><div class="m" style="font-size:9.5px;color:rgba(160,195,255,0.55);">${camOn?'consented · process & discard':'no consent · the eye is closed'}</div></div>
        ${gateGlyph(camOn)}
      </div></div>`;

  } else if (k === 'device') {
    const d = S.device;
    if (!d) {
      // No device push (the Mac console): show what this node is, from the worldview.
      el.innerHTML = `<div class="m" style="font-size:11px;color:rgba(150,180,255,0.6);">${esc(v.group_label)} · ${esc(v.node_id)}</div>`;
      return;
    }
    const CONSENT_META = { location:'position', motion:'motion', face:'face', discovery:'survey', reasoning:'reason' };
    el.innerHTML = `<div style="max-width:720px;">
      <div class="m" style="font-size:10px;color:rgba(150,180,255,0.6);margin-bottom:6px;">${esc(d.label)} · b${esc(d.build)} · ${esc(v.group_label)}</div>
      <div class="m" style="font-size:9px;color:rgba(150,180,255,0.45);margin-bottom:16px;">${(d.hosts||[]).map((h,i)=>(h===d.host?'▸':'')+esc(h)).join(' · ')}</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px;">` +
      Object.entries(CONSENT_META).map(([key, label]) => {
        const on = !!(d.consents && d.consents[key]);
        return `<button onclick="toApp('consent',{key:'${key}',on:${!on}})" style="display:flex;flex-direction:column;align-items:center;gap:10px;padding:18px 12px;border-radius:14px;background:rgba(16,34,60,0.24);border:1px solid ${on?'rgba(61,220,151,0.28)':'rgba(255,110,110,0.22)'};cursor:pointer;">
          ${gateGlyph(on)}
          <span class="m" style="font-size:9px;letter-spacing:0.14em;color:rgba(200,216,248,0.6);">${label}</span>
        </button>`;
      }).join('') + `</div>
      <div style="margin-top:24px;display:flex;align-items:center;gap:12px;">
        <button id="unenroll" onclick="sphereUnenroll()" style="display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:12px;background:rgba(60,10,16,${S.unenrollArmed?'0.55':'0.25'});border:1px solid rgba(255,110,110,${S.unenrollArmed?'0.7':'0.3'});cursor:pointer;">
          <svg viewBox="0 0 24 24" fill="none" stroke="#ff8fa3" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px;"><path d="M18 6L6 18M6 6l12 12"/></svg>
          <span class="m" style="font-size:9px;letter-spacing:0.14em;color:#ff8fa3;">${S.unenrollArmed ? 'CONFIRM' : 'SEVER'}</span>
        </button>
      </div>
    </div>`;

}

}
const arcTmp = new THREE.Vector3();
function animateArcs(t) {
  const on = (S.mode === 'globe' && !G.diving) ? 1 : 0;
  for (const arc of [...G.arcs, ...G.frontierArcs]) {
    const N2 = arc.N, gain = arc.gain;
    const fl = 0.6 + 0.4 * Math.sin(t * arc.jrate + arc.seed) * Math.sin(t * 2.3 + arc.seed * 1.7);
    const crackle = (Math.sin(t * 30 + arc.seed) > 0.86) ? 0.35 : 1.0;
    const cP = arc.core.g.attributes.position.array, gP = arc.glow.g.attributes.position.array, bP = arc.branch.g.attributes.position.array;
    for (let sI = 0; sI <= N2; sI++) {
      const tt = sI / N2, env = Math.sin(Math.PI * tt), bi = arc.biN[sI], rad = arc.radN[sI], p = arc.base[sI];
      const n1 = Math.sin(tt * 17 + t * arc.jrate + arc.seed), n2 = Math.sin(tt * 41 - t * (arc.jrate * 1.7) + arc.seed * 2.1), n3 = Math.sin(tt * 7 + t * 2.0 + arc.seed);
      const off = (n1 * 0.6 + n2 * 0.28 + n3 * 0.5) * 0.05 * env * gain, rOff = (Math.sin(tt * 23 + t * 5 + arc.seed) * 0.5) * 0.03 * env;
      arcTmp.copy(p).addScaledVector(bi, off).addScaledVector(rad, rOff); cP[sI*3]=arcTmp.x; cP[sI*3+1]=arcTmp.y; cP[sI*3+2]=arcTmp.z;
      const goff = (n1 * 0.6 + n3 * 0.7) * 0.06 * env * gain; arcTmp.copy(p).addScaledVector(bi, goff).addScaledVector(rad, rOff * 0.6); gP[sI*3]=arcTmp.x; gP[sI*3+1]=arcTmp.y; gP[sI*3+2]=arcTmp.z;
      const boff = -(n2 * 0.9 + Math.sin(tt*61+t*13+arc.seed)*0.5) * 0.055 * env * gain; arcTmp.copy(p).addScaledVector(bi, boff).addScaledVector(rad, -rOff); bP[sI*3]=arcTmp.x; bP[sI*3+1]=arcTmp.y; bP[sI*3+2]=arcTmp.z;
    }
    arc.core.g.attributes.position.needsUpdate = true; arc.glow.g.attributes.position.needsUpdate = true; arc.branch.g.attributes.position.needsUpdate = true;
    arc.core.m.opacity = on * gain * (0.75 + 0.25 * fl) * crackle;
    arc.glow.m.opacity = on * gain * 0.32 * (0.6 + 0.4 * fl);
    arc.branch.m.opacity = on * gain * (0.28 + 0.3 * Math.abs(fl)) * crackle;
    const sample = (pp) => { const idx = Math.max(0, Math.min(N2, Math.floor(pp * N2))); const arr = arc.core.g.attributes.position.array; arcTmp.set(arr[idx*3], arr[idx*3+1], arr[idx*3+2]); return arcTmp; };
    arc.sparks.forEach((sk, si) => {
      const pp = (t * arc.speed * (1 + si*0.4) + arc.phase + si*0.33) % 1;
      sk.sp.position.copy(sample(pp));
      sk.mm.opacity = on * gain * 0.85 * Math.sin(pp*Math.PI) * (si === 2 ? crackle : 1);
    });
  }
}

// ---- street-level arcs: 2D lightning between host-projected screen points ----
let streetPts = [];
window.streetArcPoints = (pts) => { streetPts = pts || []; };
(function streetArcLoop() {
  const cv = $('streetArcs'); const ctx = cv.getContext('2d');
  const draw = (tms) => {
    requestAnimationFrame(draw);
    if (S.mode !== 'street' && !parseFloat(cv.style.opacity)) return;
    const dpr = Math.min(2, window.devicePixelRatio || 1);
    const w = cv.clientWidth, h = cv.clientHeight;
    if (cv.width !== w*dpr || cv.height !== h*dpr) { cv.width = w*dpr; cv.height = h*dpr; }
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, w, h);
    const t = tms/1000;
    const selfP = streetPts.find(p => p.self);
    if (!selfP) return;
    for (const p of streetPts) {
      if (p.self) continue;
      const seg = 22, x1 = selfP.x, y1 = selfP.y, x2 = p.x, y2 = p.y;
      const nx = -(y2 - y1), ny = (x2 - x1), L = Math.hypot(nx, ny) || 1;
      if (L < 8) continue;
      const bright = !p.frontier;
      const seed = (p.label || '').length * 7.3;
      for (const [width, alpha, amp, color] of bright
        ? [[2.2, 0.85, 18, '#e4f6ff'], [4.5, 0.25, 22, '#4d93ff'], [1.2, 0.5, 26, '#8fd0ff']]
        : [[1.4, 0.35, 12, '#7d93a8']]) {
        ctx.beginPath();
        for (let i = 0; i <= seg; i++) {
          const tt = i/seg;
          let x = x1 + (x2 - x1)*tt, y = y1 + (y2 - y1)*tt;
          const env = Math.sin(Math.PI*tt);
          const off = (Math.sin(tt*13 + t*9 + seed)*0.6 + Math.sin(tt*33 - t*14 + seed)*0.4) * amp * env;
          x += nx/L*off; y += ny/L*off;
          i ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
        }
        const crackle = (Math.sin(t*30 + seed) > 0.86) ? 0.4 : 1.0;
        ctx.strokeStyle = color; ctx.lineWidth = width; ctx.globalAlpha = alpha * crackle;
        ctx.shadowColor = color; ctx.shadowBlur = bright ? 10 : 5;
        ctx.stroke();
      }
      ctx.globalAlpha = 1; ctx.shadowBlur = 0;
      // travelling spark on bright arcs
      if (bright) {
        const pp = (t*0.35 + seed) % 1;
        const tt = pp, env = Math.sin(Math.PI*tt);
        let x = x1 + (x2 - x1)*tt, y = y1 + (y2 - y1)*tt;
        const off = (Math.sin(tt*13 + t*9 + seed)*0.6 + Math.sin(tt*33 - t*14 + seed)*0.4) * 18 * env;
        x += nx/L*off; y += ny/L*off;
        ctx.fillStyle = '#ffffff'; ctx.shadowColor = '#aee7ff'; ctx.shadowBlur = 12;
        ctx.globalAlpha = 0.9 * env;
        ctx.beginPath(); ctx.arc(x, y, 2.6, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1; ctx.shadowBlur = 0;
      }
    }
  };
  requestAnimationFrame(draw);
})();

renderButtons(); renderChrome(); buildScreen();
initThree();
